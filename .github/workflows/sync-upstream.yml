name: Sync upstream into custom

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync upstream/main to origin/main
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/first-fluke/oh-my-agent.git
          git fetch upstream main
          git fetch origin main custom

          git checkout -B main origin/main
          git merge --ff-only upstream/main
          git push origin main

      - name: Open or update custom sync PR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git fetch origin main custom

          if git merge-base --is-ancestor origin/main origin/custom; then
            echo "custom already contains origin/main"
            exit 0
          fi

          existing_pr="$(gh pr list --base custom --head main --state open --json number --jq '.[0].number // empty')"
          if [ -n "$existing_pr" ]; then
            echo "Sync PR already open: #$existing_pr"
            exit 0
          fi

          gh pr create \
            --base custom \
            --head main \
            --title "chore(sync): merge upstream main into custom" \
            --body "Upstream changed. Merge this PR to bring origin/main into the custom overlay branch."
